<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplikasi Dzikir Pagi & Sore Al-Ma'tsurat Sederhana, Cepat, dan 100% Offline-friendly.">
    <title>Al-Ma'tsurat - Dzikir Pagi & Sore Sederhana</title>
    
    <!-- Google Fonts: Outfit & Amiri (loads online, falls back to sans-serif/serif offline) -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <!-- Header -->
        <header class="app-header">
            <div class="header-main">
                <div class="brand">
                    <span class="logo-emoji">🕌</span>
                    <div>
                        <h1>Al-Ma'tsurat</h1>
                        <p id="header-time-lbl">Dzikir Pagi & Sore</p>
                    </div>
                </div>
                
                <div class="header-controls">
                    <button class="control-btn" id="theme-toggle" title="Ubah Tema">🌙</button>
                    <button class="control-btn" id="sound-toggle" title="Suara Ketukan">🔊</button>
                </div>
            </div>

            <!-- Switcher Tabs (Pagi / Sore) -->
            <div class="mode-switcher-bar">
                <button class="mode-tab active" id="tab-pagi" data-mode="pagi">
                    <span>🌅 Dzikir Pagi</span>
                </button>
                <button class="mode-tab" id="tab-sore" data-mode="sore">
                    <span>🌇 Dzikir Sore</span>
                </button>
            </div>
        </header>

        <!-- Main Body -->
        <main class="app-content">
            
            <!-- Progress & Search Row -->
            <div class="utility-row">
                <div class="progress-panel">
                    <div class="progress-info">
                        <span>Progress Dzikir</span>
                        <span id="progress-text">0 / 10 Selesai (0%)</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progress-fill" style="width: 0%;"></div>
                    </div>
                </div>
                
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="dzikir-search" placeholder="Cari dzikir, transliterasi, terjemah...">
                    <button id="btn-reset-all" class="btn-reset" title="Reset Semua Counter">
                        🔄 Reset
                    </button>
                </div>
            </div>

            <!-- Dzikir List Grid -->
            <div class="dzikir-list" id="dzikir-list-container">
                <!-- Loaded dynamically -->
            </div>
            
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>© 2026 Al-Ma'tsurat Offline. Desain sederhana & handal.</p>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <span id="toast-icon">ℹ️</span>
        <span id="toast-msg">Notifikasi sukses</span>
    </div>

    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
